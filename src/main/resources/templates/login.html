<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Login • WriteItUp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:black;
            font-family:'Segoe UI', sans-serif;
        }

        .login-box{
            background:white;
            padding:40px;
            width:100%;
            max-width:420px;
            border-radius:20px;
            border:1px solid #d1d5db;
            box-shadow:0 4px 20px rgba(0,0,0,0.08);
        }

        .title{
            font-size:36px;
            font-weight:bold;
            margin-bottom:10px;
            color:#111827;
        }

        .subtitle{
            color:#4b5563;
            margin-bottom:30px;
            font-size:15px;
        }

        .form-label{
            color:#111827;
            font-weight:500;
            margin-bottom:8px;
        }

        .form-control{
            background:white;
            border:1px solid #cbd5e1;
            color:#111827;
            padding:12px;
            border-radius:12px;
            transition:0.2s ease;
        }

        .form-control:focus{
            background:white;
            color:#111827;
            border-color:black;
            box-shadow:0 0 0 3px rgba(0,0,0,0.08);
        }

        .btn-login{
            background:black;
            border:none;
            width:100%;
            padding:12px;
            border-radius:12px;
            color:white;
            font-weight:500;
            transition:0.2s ease;
        }

        .btn-login:hover{
            background:#222;
        }

        .link{
            color:#111827;
            font-weight:500;
            text-decoration:none;
        }

        .link:hover{
            text-decoration:underline;
        }

    </style>

</head>
<body>

<div class="login-box">

    <div class="title">
        Welcome Back
    </div>

    <div class="subtitle" >
        Login to continue writing.
    </div>

    <form th:action="@{/login}" method="post">

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input type="text"
                   class="form-control"
                   name="username"
                   required>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Password
            </label>

            <input type="password"
                   class="form-control"
                   name="password"
                   required>

        </div>

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <button type="submit"
                class="btn btn-login text-white">
            Login
        </button>

    </form>

    <div class="mt-4 text-center">

        Don't have an account?

        <a href="/register" class="link">
            Register
        </a>

    </div>

    <div th:if="${param.error}"
         class="mt-3 text-danger text-center">
        Invalid credentials
    </div>

</div>

</body>
</html>
