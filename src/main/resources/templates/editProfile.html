<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Edit Profile</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />
    <style>
        body {
            background-color: #f1f5f9;
        }
        .form-container {
            max-width: 600px;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="form-container">
        <h2 class="mb-4 text-center">Edit Profile</h2>
        <form th:action="@{/updateProfile}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" th:name="username" class="form-control" id="username" th:value="${user.username}" require/>
            </div>
            <div class="mb-3">
                <label for="firstname" class="form-label">First Name</label>
                <input type="text" th:name="firstname" class="form-control" id="firstname" th:value="${user.firstname}" required />
            </div>
            <div class="mb-3">
                <label for="lastname" class="form-label">Last Name</label>
                <input type="text" th:name="lastname" class="form-control" id="lastname"  th:value="${user.lastname}"/>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="text" th:name="password" class="form-control" id="password" th:value="${user.password}" required />
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" th:name="email" class="form-control" id="email" th:value="${user.email}" required />
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <input type="text" th:name="address" class="form-control" id="address" th:value="${user.address}"/>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input type="text" th:name="phone" class="form-control" id="phone" th:value="${user.phone}"/>
            </div>
            <div class="mb-4">
                <label for="genre" class="form-label">Favorite Genre</label>
                <select id="genre" name="genre" class="form-select">
                    <option disabled>Select a genre</option>
                    <option >Fiction</option>
                    <option >Non-Fiction</option>
                    <option >Poetry</option>
                    <option >Drama</option>
                    <option >Mystery</option>
                    <option >Thriller</option>
                    <option >Science Fiction</option>
                    <option >Historical Fiction</option>
                    <option >Romance</option>
                    <option >Horror</option>
                    <option >Adventure</option>
                    <option >Young Adult</option>
                    <option >Children's Literature</option>
                    <option >Satire</option>
                    <option >Autobiography</option>
                    <option >Biography</option>
                    <option >Essay</option>
                    <option >Self-Help</option>
                    <option >Philosophy</option>
                </select>
            </div>

<!--            <div class="mb-3">-->
<!--                <label for="instagram" class="form-label">Instagram</label>-->
<!--                <input type="url" th:name="instagram" class="form-control" id="instagram" />-->
<!--&lt;!&ndash;                th:value="${user.address}"&ndash;&gt;-->
<!--            </div>-->
            <div class="text-center">
                <button type="submit" class="btn btn-primary px-4">Save Changes</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
