<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <!-- Required meta tags -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap CSS from CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Create New Post</title>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <div class="col-md-3 col-lg-2 sidebar p-3">
      <h4 class="mb-4">WriteItUp</h4>
      <ul class="nav nav-pills flex-column mb-auto">
        <li ><a href="/" class="nav-link">Home</a></li>
        <li><a href="/explore" class="nav-link">Explore</a></li>
        <li><a href="/search" class="nav-link">Search</a></li>
        <li class="nav-item"><a href="#" class="nav-link active">Create</a></li>
        <li class="nav-item">
          <div class="container mt-5" style="max-width:800px;">

            <div class="card p-4 shadow-sm border-0 rounded-4">
          
              <h1 class="mb-4">Create New Post</h1>
          
              <form action="/users/createNewPost" method="post">
          
                <div class="mb-3">
          
                  <label class="form-label">Title</label>
          
                  <input type="text"
                         class="form-control"
                         name="title">
          
                </div>
          
                <div class="mb-3">
          
                  <label class="form-label">Post Type</label>
          
                  <select name="postType" class="form-select">
          
                    <option value="STORY">Story</option>
          
                    <option value="POEM">Poem</option>
          
                    <option value="ARTICLE">Article</option>
          
                    <option value="REVIEW">Book Review</option>
          
                    <option value="QUOTE">Quote</option>
          
                    <option value="JOURNAL">Journal</option>
          
                  </select>
          
                </div>
          
                <div class="mb-3">
          
                  <label class="form-label">Content</label>
          
                  <textarea
                          class="form-control"
                          rows="12"
                          name="content"></textarea>
          
                </div>
          
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />
          
                <button type="submit" class="btn btn-dark">
                  Publish
                </button>
          
              </form>
          
            </div>
          
          </div>
    </div>
  </div>
</div>
</body>
</html>
